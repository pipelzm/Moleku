name: ci

on:
  push:
  pull_request:

jobs:
  smoke-light:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Smoke import without chemistry stack
        run: |
          python -c "import mcrg_desktop; import mcrg; print('smoke-light-ok')"

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Miniconda (conda-forge)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          auto-activate: true
          activate-environment: base
          conda-remove-defaults: true
          miniforge-variant: Miniforge3
          miniforge-version: latest
          use-mamba: false
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          conda install -y -c conda-forge rdkit pandas pillow numpy openpyxl reportlab pytest tk
          python -m pip install --upgrade pip
          python -m pip install customtkinter matplotlib

      - name: Run tests
        shell: bash -l {0}
        run: |
          python -m pytest -q

      - name: Smoke import (no GUI)
        shell: bash -l {0}
        run: |
          python -c "import mcrg_desktop; import mcrg; print('smoke-ok')"
