name: ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Miniconda (conda-forge)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          miniforge-variant: Miniforge3
          miniforge-version: latest
          use-mamba: true
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          mamba install -y rdkit pandas pillow pytest
          python -m pip install --upgrade pip
          python -m pip install customtkinter matplotlib numpy

      - name: Run tests
        shell: bash -l {0}
        run: |
          pytest -q

      - name: Smoke import (no GUI)
        shell: bash -l {0}
        run: |
          python -c "import mcrg_desktop; import mcrg; print('smoke-ok')"

